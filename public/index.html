<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THW Messenger</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#ece5dd;
}

/* AUTH SCREENS */

.screen{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#128C7E;
}

.box{
background:white;
padding:35px;
border-radius:10px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
text-align:center;
}

.title{
font-size:28px;
font-weight:bold;
color:#128C7E;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#25D366;
color:white;
font-size:16px;
cursor:pointer;
}

/* CHAT */

#chatScreen{
display:none;
height:100vh;
}

#chatContainer{
display:flex;
height:100%;
}

/* USERS */

#usersPanel{
width:30%;
background:#075E54;
color:white;
overflow-y:auto;
}

#usersPanel h3{
padding:15px;
margin:0;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.user{
display:flex;
align-items:center;
padding:12px;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.user:hover{
background:rgba(255,255,255,0.1);
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#ccc;
margin-right:10px;
}

.online{
width:10px;
height:10px;
background:#25D366;
border-radius:50%;
margin-left:auto;
}

/* CHAT AREA */

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#chatHeader{
background:#075E54;
color:white;
padding:15px;
font-size:18px;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
}

/* MESSAGES */

.message{
padding:10px 14px;
border-radius:10px;
margin-bottom:10px;
max-width:65%;
font-size:14px;
}

.me{
align-self:flex-end;
background:#DCF8C6;
}

.them{
align-self:flex-start;
background:white;
}

.time{
font-size:10px;
color:gray;
text-align:right;
}

/* INPUT BAR */

#inputBar{
display:flex;
padding:10px;
background:#f0f0f0;
align-items:center;
}

#msg{
flex:1;
padding:12px;
border-radius:20px;
border:none;
}

.icon{
font-size:20px;
margin-left:10px;
cursor:pointer;
}

#typing{
font-size:12px;
padding-left:15px;
color:#666;
}

</style>
</head>

<body>

<!-- SIGNUP -->

<div id="signupScreen" class="screen">

<div class="box">

<div class="title">THW Messenger</div>

<input id="suUser" placeholder="Username">
<input id="suEmail" placeholder="Email">
<input id="suPhone" placeholder="Phone">
<input id="suPass" type="password" placeholder="Password">

<button onclick="sendCode()">Send Verification Code</button>

<input id="otp" placeholder="Verification Code">

<button onclick="signup()">Create Account</button>

<p>Already have account? <a href="#" onclick="showLogin()">Login</a></p>

</div>

</div>

<!-- LOGIN -->

<div id="loginScreen" class="screen" style="display:none">

<div class="box">

<div class="title">Login</div>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- CHAT -->

<div id="chatScreen">

<div id="chatContainer">

<div id="usersPanel">

<h3>Online Users</h3>

<div id="usersList"></div>

</div>

<div id="chatArea">

<div id="chatHeader" id="chatUser">Select User</div>

<div id="messages"></div>

<div id="typing"></div>

<div id="inputBar">

<input id="msg" placeholder="Type message">

<div class="icon" onclick="sendFile()">📎</div>

<div class="icon" onclick="recordVoice()">🎤</div>

<div class="icon" onclick="send()">➤</div>

<input type="file" id="fileInput" style="display:none">

</div>

</div>

</div>

</div>

<script>

const socket = io()

let username=""
let currentChat=""
let recorder
let audioChunks=[]
let recording=false

function showLogin(){
signupScreen.style.display="none"
loginScreen.style.display="flex"
}

/* EMAIL CODE */

async function sendCode(){

await fetch("/send-code",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:suEmail.value})
})

alert("Verification code sent")

}

/* SIGNUP */

async function signup(){

let res=await fetch("/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:suUser.value,
password:suPass.value,
phone:suPhone.value,
email:suEmail.value,
code:otp.value
})
})

let data=await res.json()

if(data.success){
alert("Account created")
showLogin()
}else{
alert("Signup failed")
}

}

/* LOGIN */

async function login(){

let res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:loginUser.value,
password:loginPass.value
})
})

let data=await res.json()

if(data.success){

username=data.username

loginScreen.style.display="none"
chatScreen.style.display="block"

socket.emit("join",username)

}else{

alert("Login failed")

}

}

/* USER LIST */

socket.on("user list",(users)=>{

usersList.innerHTML=""

users.forEach(u=>{

if(u!==username){

let div=document.createElement("div")

div.className="user"

div.innerHTML="<div class='avatar'></div>"+u+"<div class='online'></div>"

div.onclick=()=>{

currentChat=u
chatHeader.innerText=u

}

usersList.appendChild(div)

}

})

})

/* SEND MESSAGE */
function send(){

if(!currentChat){
alert("Select a user first")
return
}

let text = msg.value.trim()

if(text === "") return

socket.emit("private message",{
from:username,
to:currentChat,
message:text,
type:"text"
})

addMessage(text,true)

msg.value=""

}

/* RECEIVE MESSAGE */

socket.on("private message",(data)=>{

addMessage(data.message,false)

socket.emit("read",{to:data.from})

})

/* TYPING */

msg.addEventListener("input",()=>{

socket.emit("typing",{to:currentChat,from:username})

})

socket.on("typing",(data)=>{

typing.innerText=data.from+" typing..."

setTimeout(()=>typing.innerText="",1500)

})

/* ADD MESSAGE */

function addMessage(text,me){

let div=document.createElement("div")

div.className="message "+(me?"me":"them")

div.innerHTML=text+"<div class='time'>"+new Date().toLocaleTimeString()+"</div>"

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

/* FILE */

function sendFile(){
fileInput.click()
}

/* VOICE */

async function recordVoice(){

if(!recording){

let stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)

recorder.start()

audioChunks=[]
recording=true

recorder.ondataavailable=e=>audioChunks.push(e.data)

}else{

recorder.stop()

recorder.onstop=async()=>{

let blob=new Blob(audioChunks)

let form=new FormData()

form.append("file",blob,"voice.webm")

let res=await fetch("/upload",{method:"POST",body:form})

let data=await res.json()

socket.emit("private message",{
from:username,
to:currentChat,
message:"Voice: "+data.file,
type:"voice"
})

}

recording=false

}

}

</script>

</body>
</html>
