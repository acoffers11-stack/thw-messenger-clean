<!DOCTYPE html>
<html>
<head>
<title>THW Messenger</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e5ddd5;
}

/* LOGIN + SIGNUP */

.screen{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
background:#0cc1b5;
}

.screen input{
padding:10px;
margin:6px;
width:220px;
border:none;
border-radius:6px;
}

.screen button{
padding:10px 20px;
border:none;
border-radius:6px;
background:white;
cursor:pointer;
margin-top:10px;
}

/* CHAT */

#chatScreen{
display:none;
height:100vh;
}

#chatContainer{
display:flex;
height:100%;
}

#usersPanel{
width:250px;
background:#0cc1b5;
color:white;
padding:10px;
overflow-y:auto;
}

.user{
padding:10px;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.user:hover{
background:rgba(255,255,255,0.2);
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#header{
background:#0cc1b5;
color:white;
padding:15px;
font-size:20px;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
background:white;
padding:8px;
margin:6px;
border-radius:6px;
max-width:60%;
}

#inputBar{
display:flex;
padding:10px;
background:#f0f0f0;
}

#messageInput{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

#sendBtn{
background:#0cc1b5;
color:white;
border:none;
padding:10px 15px;
border-radius:20px;
margin-left:10px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="screen">

<h1 style="font-size:70px;color:white;margin-bottom:10px;">
THW Messenger
</h1>

<p style="color:white;font-size:18px;margin-bottom:30px;">
Welcome to THW Messenger
</p>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p style="color:white;">
No account?
<a href="#" onclick="showSignup()" style="color:white;font-weight:bold;">
Sign Up
</a>
</p>

</div>

<!-- SIGNUP -->

<div id="signupScreen" class="screen" style="display:none;">

<h1 style="font-size:60px;color:white;">THW Messenger</h1>

<h2 style="color:white;">Create Account</h2>

<input id="signupUser" placeholder="Username">
<input id="signupPass" type="password" placeholder="Password">
<input id="signupPhone" placeholder="Phone Number">

<input type="file" id="profilePic">

<button onclick="sendCode()">Send Verification Code</button>

<input id="otp" placeholder="Enter Code">

<button onclick="signup()">Create Account</button>

<p style="color:white;">
Already have account?
<a href="#" onclick="showLogin()" style="color:white;font-weight:bold;">
Login
</a>
</p>

</div>

<!-- CHAT -->

<div id="chatScreen">

<div id="chatContainer">

<!-- USERS -->

<div id="usersPanel">

<h3>Online Users</h3>

<div id="usersList"></div>

</div>

<!-- CHAT AREA -->

<div id="chatArea">

<div id="header">THW Messenger</div>

<div id="messages"></div>

<div id="inputBar">

<input id="messageInput" placeholder="Type message">

<input type="file" id="fileInput">

<button id="sendBtn" onclick="sendMessage()">Send</button>

<button onclick="sendFile()">File</button>

</div>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

let socket = io();

let username="";
let selectedUser="";

/* SWITCH SCREENS */

function showSignup(){
document.getElementById("loginScreen").style.display="none";
document.getElementById("signupScreen").style.display="flex";
}

function showLogin(){
document.getElementById("signupScreen").style.display="none";
document.getElementById("loginScreen").style.display="flex";
}

/* LOGIN */

async function login(){

let user=document.getElementById("loginUser").value;
let pass=document.getElementById("loginPass").value;

let res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,password:pass})
});

let data=await res.json();

if(data.success){

username=user;

document.getElementById("loginScreen").style.display="none";
document.getElementById("chatScreen").style.display="block";

socket.emit("join",username);

}else{

alert("Login failed");

}

}

/* SEND SMS */

async function sendCode(){

let phone=document.getElementById("signupPhone").value;

await fetch("/send-code",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({phone})
});

alert("Verification code sent");

}

/* SIGNUP */

async function signup(){

let user=document.getElementById("signupUser").value;
let pass=document.getElementById("signupPass").value;
let phone=document.getElementById("signupPhone").value;

let form=new FormData();

form.append("username",user);
form.append("password",pass);
form.append("phone",phone);
form.append("profile",document.getElementById("profilePic").files[0]);

let res=await fetch("/signup",{
method:"POST",
body:form
});

let data=await res.json();

if(data.success){

alert("Account created");
showLogin();

}else{

alert("User exists");

}

}

/* USERS LIST */

socket.on("user list",(users)=>{

let list=document.getElementById("usersList");
list.innerHTML="";

users.forEach(user=>{

let div=document.createElement("div");

div.className="user";
div.innerText=user;

div.onclick=()=>{
selectedUser=user;
};

list.appendChild(div);

});

});

/* SEND MESSAGE */

function sendMessage(){

let msg=document.getElementById("messageInput").value;

socket.emit("private message",{
from:username,
to:selectedUser,
message:msg
});

document.getElementById("messageInput").value="";

}

/* RECEIVE MESSAGE */

socket.on("private message",(data)=>{

let div=document.createElement("div");
div.className="message";

if(data.message.startsWith("FILE:")){

let file=data.message.replace("FILE:","");
div.innerHTML=data.from + ": <a href='/uploads/"+file+"' target='_blank'>Download File</a>";

}else{

div.innerText=data.from + ": " + data.message;

}

document.getElementById("messages").appendChild(div);

});

/* FILE SEND */

async function sendFile(){

let file=document.getElementById("fileInput").files[0];

let form=new FormData();
form.append("file",file);

let res=await fetch("/upload",{
method:"POST",
body:form
});

let data=await res.json();

socket.emit("private message",{
from:username,
to:selectedUser,
message:"FILE:"+data.file
});

}

</script>

</body>
</html>
