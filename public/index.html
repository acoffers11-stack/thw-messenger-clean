<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THW Messenger</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
background:#ece5dd;
}

/* AUTH SCREENS */

.screen{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#128C7E;
}

.box{
background:white;
padding:35px;
border-radius:10px;
width:320px;
max-width:90%;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
text-align:center;
}

.title{
font-size:28px;
font-weight:bold;
color:#128C7E;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#25D366;
color:white;
font-size:16px;
cursor:pointer;
}

/* CHAT */

#chatScreen{
display:none;
height:100vh;
position:relative;
}

#chatContainer{
display:flex;
height:100%;
}

/* USERS */

#usersPanel{
width:30%;
background:#075E54;
color:white;
overflow-y:auto;
}

#usersPanel h3{
padding:15px;
margin:0;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.user{
display:flex;
align-items:center;
padding:12px;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.user:hover{
background:rgba(255,255,255,0.1);
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#ccc;
margin-right:10px;
}

.online{
width:10px;
height:10px;
background:#25D366;
border-radius:50%;
margin-left:auto;
}

/* CHAT AREA */

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#chatHeader{
background:#075E54;
color:white;
padding:15px;
font-size:18px;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
}

/* MESSAGES */

.message{
padding:10px 14px;
border-radius:10px;
margin-bottom:10px;
max-width:65%;
font-size:14px;
}

.me{
align-self:flex-end;
background:#DCF8C6;
}

.them{
align-self:flex-start;
background:white;
}

.time{
font-size:10px;
color:gray;
text-align:right;
}

/* INPUT BAR */

#inputBar{
display:flex;
padding:10px;
background:#f0f0f0;
align-items:center;
}

#msg{
flex:1;
padding:12px;
border-radius:20px;
border:none;
}

.icon{
font-size:20px;
margin-left:10px;
cursor:pointer;
}

#typing{
font-size:12px;
padding-left:15px;
color:#666;
}

/* BOTTOM NAVIGATION */

#bottomNav{
position:fixed;
bottom:0;
width:100%;
background:#075E54;
display:flex;
justify-content:space-around;
align-items:center;
padding:10px 0;
z-index:10;
}

.navItem{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
color:white;
font-size:12px;
padding:5px;
border-radius:10px;
transition:background 0.2s;
}

.navItem:hover{
background:rgba(255,255,255,0.1);
}

.navItem.active{
color:#25D366;
}

.navIcon{
font-size:20px;
margin-bottom:2px;
}

.navLabel{
font-size:10px;
}

.tabScreen{
height: 100%;
overflow-y:auto;
}

/* MOBILE RESPONSIVE */

@media (max-width: 768px) {
	#chatContainer {
		position: relative;
	}
	#usersPanel {
		width: 100%;
		height: 100%;
		position: absolute;
		top: 0;
		left: 0;
		z-index: 1;
	}
	#chatArea {
		width: 100%;
		height: 100%;
		position: absolute;
		top: 0;
		left: 100%;
		z-index: 2;
		transition: left 0.3s;
	}
	#chatArea.show {
		left: 0;
	}
	#chatHeader {
		display: flex;
		align-items: center;
	}
	#backBtn {
		margin-right: 10px;
		cursor: pointer;
		font-size: 20px;
	}
	.box {
		width: 90%;
		padding: 20px;
	}
	input, button {
		font-size: 16px; /* Prevent zoom on iOS */
	}
}

@media (min-width: 769px) {
	#backBtn {
		display: none;
	}
}

</style>
</head>

<body>

<!-- SIGNUP -->

<div id="signupScreen" class="screen">

<div class="box">

<div class="title">THW Messenger</div>

<input id="suUser" placeholder="Username">
<input id="suEmail" placeholder="Email">
<input id="suPhone" placeholder="Phone">
<input id="suPass" type="password" placeholder="Password">

<button onclick="sendCode()">Send Verification Code</button>

<input id="otp" placeholder="Verification Code">

<button onclick="signup()">Create Account</button>

<p>Already have account? <a href="#" onclick="showLogin()">Login</a></p>

</div>

</div>

<!-- LOGIN -->

<div id="loginScreen" class="screen" style="display:none">

<div class="box">

<div class="title">Login</div>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- CHAT -->

<div id="app" style="display:none; height:calc(100vh - 60px); position:relative; overflow:hidden;">

	<!-- CHATS SCREEN -->
	<div id="chatsScreen" class="tabScreen">
		<div id="chatContainer">
			<div id="usersPanel">
				<h3>Chats</h3>
				<div id="chatsList"></div>
			</div>
			<div id="chatArea">
				<div id="chatHeader"><span id="backBtn" onclick="showChats()">←</span> Select Chat</div>
				<div id="messages"></div>
				<div id="typing"></div>
				<div id="inputBar">
					<input id="msg" placeholder="Type message">
					<div class="icon" onclick="sendFile()">📎</div>
					<div class="icon" onclick="recordVoice()">🎤</div>
					<div class="icon" onclick="send()">➤</div>
					<input type="file" id="fileInput" style="display:none">
				</div>
			</div>
		</div>
	</div>

	<!-- CALLS SCREEN -->
	<div id="callsScreen" class="tabScreen" style="display:none;">
		<div style="padding:20px;">
			<h2>Calls</h2>
			<div id="callLogs"></div>
			<button onclick="startCall()">Start New Call</button>
		</div>
	</div>

	<!-- STATUS SCREEN -->
	<div id="statusScreen" class="tabScreen" style="display:none;">
		<div style="padding:20px;">
			<h2>Status</h2>
			<p>Status updates coming soon...</p>
		</div>
	</div>

	<!-- SETTINGS SCREEN -->
	<div id="settingsScreen" class="tabScreen" style="display:none;">
		<div style="padding:20px;">
			<h2>Settings</h2>
			<div>
				<h3>Profile</h3>
				<img id="profilePic" src="" alt="Profile" style="width:50px; height:50px; border-radius:50%;">
				<button onclick="changeProfilePic()">Change Profile Picture</button>
			</div>
			<div>
				<h3>Privacy</h3>
				<label><input type="checkbox" id="readReceipts"> Read Receipts</label>
				<label><input type="checkbox" id="lastSeen"> Last Seen</label>
			</div>
			<div>
				<h3>Data</h3>
				<button onclick="downloadData()">Download Your Data</button>
			</div>
			<div>
				<h3>Other</h3>
				<button onclick="logout()">Logout</button>
			</div>
		</div>
	</div>

</div>

	<!-- BOTTOM NAVIGATION -->
	<div id="bottomNav" style="display:none;">
		<div class="navItem" id="statusTab">
			<div class="navIcon">⭕</div>
			<div class="navLabel">Status</div>
		</div>
		<div class="navItem active" id="chatsTab">
			<div class="navIcon">💬</div>
			<div class="navLabel">Chats</div>
		</div>
		<div class="navItem" id="callsTab">
			<div class="navIcon">📞</div>
			<div class="navLabel">Calls</div>
		</div>
		<div class="navItem" id="settingsTab">
			<div class="navIcon">⚙️</div>
			<div class="navLabel">Settings</div>
		</div>
	</div>

<script>

const socket = io()

let username=""
let currentChat=""
let recorder
let audioChunks=[]
let recording=false

function showChats(){
	chatArea.classList.remove('show');
	chatHeader.innerHTML = 'Select Chat';
	currentChat = '';
}

let onlineUsers = []
let conversations = []

async function loadConversations(){
	if(!username) return
	try{
		let res = await fetch(`/conversations/${encodeURIComponent(username)}`)
		conversations = await res.json()
		renderConversations()
	}catch(e){
		console.error(e)
	}
}

function renderConversations(){
	chatsList.innerHTML = ""
	if(!conversations.length){
		chatsList.innerHTML = "<p>No recent chats</p>"
		return
	}

	conversations.forEach(c=>{
		let div = document.createElement('div')
		div.className = 'user'
		let online = onlineUsers.includes(c.contact)
		div.innerHTML = `<div class='avatar'></div><div style='flex:1'>${c.contact}<div style='font-size:12px;color:#ccc;'>${c.lastMessage || ''}</div></div><div class='online' style='background:${online?"#25D366":"rgba(255,255,255,0.2)"}'></div>`
		div.onclick = () => loadChat(c.contact)
		chatsList.appendChild(div)
	})
}

async function loadChat(contact){
	currentChat = contact
	chatHeader.innerHTML = `<span id='backBtn' onclick='showChats()'>←</span> ${contact}`
	messages.innerHTML = ''
	try{
		let res = await fetch(`/messages?user=${encodeURIComponent(username)}&contact=${encodeURIComponent(contact)}`)
		let msgs = await res.json()
		msgs.forEach(m=> addMessage(m.message, m.sender === username))
		messages.scrollTop = messages.scrollHeight
		// mark read
		await fetch('/read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:username,contact})})
	}catch(e){
		console.error(e)
	}
	if(window.innerWidth <= 768){
		chatArea.classList.add('show');
	}
}

/* EMAIL CODE */

async function sendCode(){

await fetch("/send-code",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:suEmail.value})
})

alert("Verification code sent")

}

/* SIGNUP */

async function signup(){

let res=await fetch("/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:suUser.value,
password:suPass.value,
phone:suPhone.value,
email:suEmail.value,
code:otp.value
})
})

let data=await res.json()

if(data.success){
alert("Account created")
showLogin()
}else{
alert("Signup failed")
}

}

/* LOGIN */

async function login(){

let res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:loginUser.value,
password:loginPass.value
})
})

let data=await res.json()

if(data.success){

username=data.username

loginScreen.style.display="none"
app.style.display="block"
bottomNav.style.display="flex"

if(data.profilePic){
	profilePic.src = '/profiles/' + data.profilePic
}

socket.emit("join",username)

loadConversations()

}else{

alert("Login failed")

}

}

/* USER LIST */

socket.on("user list",(users)=>{
	onlineUsers = users
	renderConversations()

})

/* SEND MESSAGE */
function send(){

if(!currentChat){
alert("Select a user first")
return
}

let text = msg.value.trim()

if(text === "") return

socket.emit("private message",{
from:username,
to:currentChat,
message:text,
type:"text"
})

addMessage(text,true)

// refresh conversation list so last message updates
loadConversations()

msg.value=""

}

/* RECEIVE MESSAGE */

socket.on("private message",(data)=>{

addMessage(data.message,false)

socket.emit("read",{to:data.from})

})

/* TYPING */

msg.addEventListener("input",()=>{

socket.emit("typing",{to:currentChat,from:username})

})

socket.on("typing",(data)=>{

typing.innerText=data.from+" typing..."

setTimeout(()=>typing.innerText="",1500)

})

socket.on("call",(data)=>{
	if(data.to !== username) return
	let accept = confirm(`${data.from} is calling you. Accept?`)
	if(accept){
		socket.emit('call-accepted',{from:username,to:data.from})
		alert('Call started with ' + data.from)
	}else{
		socket.emit('call-declined',{from:username,to:data.from})
	}
})

socket.on('call-accepted',(data)=>{
	if(data.to !== username) return
	alert(data.from + ' accepted the call')
})

socket.on('call-declined',(data)=>{
	if(data.to !== username) return
	alert(data.from + ' declined the call')
})

/* ADD MESSAGE */

function addMessage(text,me){

let div=document.createElement("div")

div.className="message "+(me?"me":"them")

div.innerHTML=text+"<div class='time'>"+new Date().toLocaleTimeString()+"</div>"

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

/* FILE */

function sendFile(){
fileInput.click()
}

/* VOICE */

async function recordVoice(){

if(!recording){

let stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)

recorder.start()

audioChunks=[]
recording=true

recorder.ondataavailable=e=>audioChunks.push(e.data)

}else{

recorder.stop()

recorder.onstop=async()=>{

let blob=new Blob(audioChunks)

let form=new FormData()

form.append("file",blob,"voice.webm")

let res=await fetch("/upload",{method:"POST",body:form})

let data=await res.json()

socket.emit("private message",{
from:username,
to:currentChat,
message:"Voice: "+data.file,
type:"voice"
})

}

recording=false

}

}

/* BOTTOM NAV */

document.querySelectorAll('.navItem').forEach(item => {
	item.addEventListener('click', () => {
		document.querySelectorAll('.navItem').forEach(i => i.classList.remove('active'));
		item.classList.add('active');
		document.querySelectorAll('.tabScreen').forEach(s => s.style.display = 'none');
		let screenId = item.id.replace('Tab', 'Screen');
		document.getElementById(screenId).style.display = 'block';
		if(screenId === 'callsScreen') loadCallLogs();
	});
});

/* CALLS */

async function startCall(){
	let user = prompt("Enter username to call:");
	if(!user) return

	// Notify server to store call log
	await fetch('/call',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:username,to:user,type:'audio'})})
	
	// Inform remote user
	socket.emit('call', {from: username, to: user})

	alert('Calling ' + user)
	loadCallLogs()
}

async function loadCallLogs(){
	callLogs.innerHTML = "";
	try{
		let res = await fetch(`/calls/${encodeURIComponent(username)}`)
		let logs = await res.json()
		if(!logs.length){
			callLogs.innerHTML = "<p>No call logs</p>"
			return
		}
		logs.forEach(log => {
			let who = log.caller === username ? log.callee : log.caller
			let div = document.createElement("div");
			div.textContent = `${log.caller} → ${log.callee} (${log.type || 'call'}) at ${new Date(log.time).toLocaleString()}`
			callLogs.appendChild(div);
		})
	}catch(e){
		callLogs.innerHTML = "<p>Unable to load call logs</p>"
		console.error(e)
	}
}

/* SETTINGS */

async function changeProfilePic(){
	let input = document.createElement("input");
	input.type = "file";
	input.accept = "image/*";
	input.onchange = async e => {
		let file = e.target.files[0];
		if(file){
			let form = new FormData();
			form.append('photo', file);
			form.append('username', username);
			let res = await fetch('/upload-profile', {method:'POST', body: form});
			let data = await res.json();
			if(data.file){
				profilePic.src = '/profiles/' + data.file;
			}
		}
	};
	input.click();
}

function downloadData(){
	let data = {
		username,
		profilePic: localStorage.getItem('profilePic'),
		callLogs: JSON.parse(localStorage.getItem('callLogs') || '[]'),
		// Add chat history if stored
	};
	let blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
	let url = URL.createObjectURL(blob);
	let a = document.createElement("a");
	a.href = url;
	a.download = "mydata.json";
	a.click();
}

function logout(){
	username = ""
	currentChat = ""
	app.style.display = "none"
	bottomNav.style.display = "none"
	loginScreen.style.display = "flex"
}

// Load data on start
window.onload = () => {
	let pic = localStorage.getItem('profilePic');
	if(pic) profilePic.src = pic;
	loadCallLogs();
	readReceipts.checked = localStorage.getItem('readReceipts') === 'true';
	lastSeen.checked = localStorage.getItem('lastSeen') === 'true';
};

readReceipts.addEventListener('change', () => localStorage.setItem('readReceipts', readReceipts.checked));
lastSeen.addEventListener('change', () => localStorage.setItem('lastSeen', lastSeen.checked));

</script>

</body>
</html>
